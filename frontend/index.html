<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>Calculator</h1>
    <form id="calc-form" novalidate>
      <div class="form-group">
        <label for="operand_a">First Number</label>
        <input
          type="number"
          id="operand_a"
          name="operand_a"
          placeholder="e.g. 10"
          aria-required="true"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="operation">Operation</label>
        <select id="operation" name="operation" aria-required="true">
          <option value="add">Add (+)</option>
          <option value="subtract">Subtract (-)</option>
          <option value="multiply">Multiply (*)</option>
          <option value="divide">Divide (/)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="operand_b">Second Number</label>
        <input
          type="number"
          id="operand_b"
          name="operand_b"
          placeholder="e.g. 5"
          aria-required="true"
          autocomplete="off"
        />
      </div>

      <button type="submit" id="calc-btn">Calculate</button>
    </form>

    <div
      id="result-box"
      class="result-box"
      role="region"
      aria-live="polite"
      aria-atomic="true"
      aria-label="Calculation result"
    ></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
